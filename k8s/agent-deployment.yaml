apiVersion: apps/v1
kind: Deployment
metadata:
  name: maos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maos
  template:
    metadata:
      labels:
        app: maos
    spec:
      containers:
        - name: maos
          image: maos:local
          imagePullPolicy: Never
          env:
            - name: OLLAMA_BASE_URL
              value: "http://host.docker.internal:11434"
            - name: OLLAMA_MODEL
              value: "qwen2.5:3b"
